name: Deploy Portfolio to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS
        run: |
          # Cria diretório se não existir e limpa (preserva node_modules para cache)
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p /www/wwwroot/portfolio && \
             cd /www/wwwroot/portfolio && \
             find . -mindepth 1 -maxdepth 1 ! -name 'node_modules' -exec rm -rf {} +"
          
          # Copia arquivos do projeto (dist, package.json, etc)
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no -r \
            dist package.json package-lock.json \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/www/wwwroot/portfolio
          
          # Instala dependências e inicia com PM2 na porta 3333
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cd /www/wwwroot/portfolio && \
             npm ci --production && \
             pm2 delete portfolio 2>/dev/null || true && \
             pm2 start 'npx astro preview --host 0.0.0.0 --port 3333' --name portfolio && \
             echo '✅ Deploy concluído - Rodando na porta 3333'"
